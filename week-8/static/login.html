<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — FinTech Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #1a2744 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .card {
            width: 420px;
            padding: 40px;
            background: #0d1b2acc;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(29, 78, 216, 0.15);
        }
        .app-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        .accent-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #1d4ed8, transparent);
            margin-bottom: 28px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            border-radius: 999px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
        }
        .tab {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 500;
            color: #94a3b8;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }
        .tab.active {
            background: #1d4ed8;
            color: #fff;
        }
        .form-panel {
            position: relative;
            min-height: 280px;
        }
        .form {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .form.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.6875rem;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-family: inherit;
            font-size: 1rem;
            color: #fff;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .form-group input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.2);
        }
        .error-msg {
            min-height: 20px;
            font-size: 0.8125rem;
            color: #ef4444;
            margin-bottom: 12px;
            visibility: hidden;
        }
        .error-msg.visible {
            visibility: visible;
        }
        .btn-primary {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: #1d4ed8;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.35);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.99);
        }
        .btn-primary:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e293b;
        }
        .divider span {
            font-size: 0.8125rem;
            color: #475569;
        }
        .btn-guest {
            margin-top: 24px;
            width: 100%;
            height: 44px;
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9375rem;
            color: #94a3b8;
            background: transparent;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .btn-guest:hover:not(:disabled) {
            border-color: #334155;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.03);
        }
        .btn-guest:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .success-check {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 16px;
        }
        .success-check.visible {
            display: flex;
        }
        .success-check svg {
            width: 24px;
            height: 24px;
            animation: checkPop 0.4s ease;
        }
        @keyframes checkPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="app-name">FinTech Analyzer</h1>
        <p class="subtitle">Professional market intelligence platform</p>
        <div class="accent-line"></div>

        <div class="tabs">
            <button type="button" class="tab active" id="tab-signin" aria-selected="true">Sign In</button>
            <button type="button" class="tab" id="tab-register" aria-selected="false">Create Account</button>
        </div>

        <div class="form-panel">
            <!-- Sign In form -->
            <form id="form-signin" class="form">
                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <p id="signin-error" class="error-msg" role="alert"></p>
                <button type="submit" class="btn-primary" id="signin-btn">Sign In</button>
                <div class="divider"><span>— or —</span></div>
                <button type="button" class="btn-guest" id="guest-btn">Continue as Guest</button>
            </form>

            <!-- Create Account form -->
            <form id="form-register" class="form hidden">
                <div class="form-group">
                    <label for="register-name">Full name (optional)</label>
                    <input type="text" id="register-name" placeholder="Jane Doe" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-password">Password (min 8 characters)</label>
                    <input type="password" id="register-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <p id="register-error" class="error-msg" role="alert"></p>
                <div id="register-success" class="success-check">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Account created. Redirecting…
                </div>
                <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const LOADING_TEXT = '···';
            const API = window.location.origin;

            function getDetailMessage(detail) {
                if (typeof detail === 'string') return detail;
                if (detail && detail.user_message) return detail.user_message;
                if (detail && detail.detail) return getDetailMessage(detail.detail);
                return 'Something went wrong. Please try again.';
            }

            function setLoading(button, loading) {
                if (!button) return;
                button.disabled = loading;
                button.dataset.originalText = button.dataset.originalText || button.textContent;
                button.textContent = loading ? LOADING_TEXT : button.dataset.originalText;
            }

            function showError(panel, message) {
                const errEl = panel === 'signin' ? document.getElementById('signin-error') : document.getElementById('register-error');
                errEl.textContent = message || '';
                errEl.classList.toggle('visible', !!message);
            }

            function clearErrors() {
                showError('signin', '');
                showError('register', '');
            }

            // Tab switching
            const tabSignIn = document.getElementById('tab-signin');
            const tabRegister = document.getElementById('tab-register');
            const formSignIn = document.getElementById('form-signin');
            const formRegister = document.getElementById('form-register');

            tabSignIn.addEventListener('click', () => {
                tabSignIn.classList.add('active');
                tabSignIn.setAttribute('aria-selected', 'true');
                tabRegister.classList.remove('active');
                tabRegister.setAttribute('aria-selected', 'false');
                formSignIn.classList.remove('hidden');
                formRegister.classList.add('hidden');
                clearErrors();
            });

            tabRegister.addEventListener('click', () => {
                tabRegister.classList.add('active');
                tabRegister.setAttribute('aria-selected', 'true');
                tabSignIn.classList.remove('active');
                tabSignIn.setAttribute('aria-selected', 'false');
                formRegister.classList.remove('hidden');
                formSignIn.classList.add('hidden');
                clearErrors();
            });

            function saveAndRedirect(data) {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/';
            }

            // Sign In
            document.getElementById('form-signin').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signin-email').value.trim();
                const password = document.getElementById('signin-password').value;
                const btn = document.getElementById('signin-btn');

                if (!email || !password) {
                    showError('signin', 'Please enter email and password.');
                    return;
                }

                showError('signin', '');
                setLoading(btn, true);

                try {
                    const res = await fetch(API + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password }),
                    });
                    const data = await res.json().catch(() => ({}));

                    if (res.ok) {
                        saveAndRedirect(data);
                        return;
                    }
                    showError('signin', getDetailMessage(data.detail));
                } catch (err) {
                    showError('signin', 'Network error. Please try again.');
                } finally {
                    setLoading(btn, false);
                }
            });

            // Guest login
            document.getElementById('guest-btn').addEventListener('click', async () => {
                const btn = document.getElementById('guest-btn');
                showError('signin', '');
                setLoading(btn, true);

                try {
                    const res = await fetch(API + '/auth/guest', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    const data = await res.json().catch(() => ({}));

                    if (res.ok) {
                        saveAndRedirect(data);
                        return;
                    }
                    showError('signin', getDetailMessage(data.detail));
                } catch (err) {
                    showError('signin', 'Network error. Please try again.');
                } finally {
                    setLoading(btn, false);
                }
            });

            // Create Account
            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            document.getElementById('form-register').addEventListener('submit', async (e) => {
                e.preventDefault();
                const full_name = document.getElementById('register-name').value.trim() || null;
                const email = document.getElementById('register-email').value.trim();
                const password = document.getElementById('register-password').value;
                const btn = document.getElementById('register-btn');
                const successEl = document.getElementById('register-success');

                if (!email) {
                    showError('register', 'Please enter an email address.');
                    return;
                }
                if (!emailRe.test(email)) {
                    showError('register', 'Please enter a valid email address.');
                    return;
                }
                if (password.length < 8) {
                    showError('register', 'Password must be at least 8 characters.');
                    return;
                }

                showError('register', '');
                successEl.classList.remove('visible');
                setLoading(btn, true);

                try {
                    let res = await fetch(API + '/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, full_name }),
                    });
                    const regData = await res.json().catch(() => ({}));

                    if (!res.ok) {
                        showError('register', getDetailMessage(regData.detail));
                        setLoading(btn, false);
                        return;
                    }

                    // Auto login to get token
                    res = await fetch(API + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password }),
                    });
                    const loginData = await res.json().catch(() => ({}));

                    if (res.ok) {
                        successEl.classList.add('visible');
                        localStorage.setItem('token', loginData.access_token);
                        localStorage.setItem('user', JSON.stringify(loginData.user));
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 800);
                        return;
                    }
                    showError('register', getDetailMessage(loginData.detail));
                } catch (err) {
                    showError('register', 'Network error. Please try again.');
                } finally {
                    setLoading(btn, false);
                }
            });

            // On load: if already logged in, redirect to /
            document.addEventListener('DOMContentLoaded', async () => {
                const token = localStorage.getItem('token');
                if (!token) return;

                try {
                    const meRes = await fetch(API + '/auth/me', {
                        headers: { 'Authorization': 'Bearer ' + token },
                    });
                    if (meRes.ok) {
                        window.location.href = '/';
                        return;
                    }
                } catch (_) {}
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            });
        })();
    </script>
</body>
</html>
